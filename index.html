<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDS Location</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f0f;
            --land: #181818;
            --land-stroke: rgba(255,255,255,0.15);
            --red: #e63535;
            --ui-bg: rgba(20,20,20,0.92);
            --ui-border: rgba(255,255,255,0.1);
            --text: #eee;
            --text-muted: rgba(255,255,255,0.4);
        }
        body { background: var(--bg); overflow: hidden; font-family: 'Syne', sans-serif; color: var(--text); }
        svg#map { width: 100vw; height: 100vh; display: block; background: var(--bg); cursor: crosshair; }
        .country { fill: var(--land); stroke: var(--land-stroke); stroke-width: 0.5px; vector-effect: non-scaling-stroke; }
        .country-border { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 0.8px; vector-effect: non-scaling-stroke; }

        /* UI Элементы */
        #header { position: fixed; top: 0; width: 100%; padding: 22px 30px; display: flex; justify-content: space-between; pointer-events: none; z-index: 20; }
        #logo { font-family: 'Space Mono'; letter-spacing: 0.3em; text-transform: uppercase; pointer-events: auto; }
        #logo em { color: var(--red); font-style: normal; }

        /* Поиск */
        #search-container { position: fixed; top: 80px; left: 30px; z-index: 100; display: flex; gap: 10px; }
        #city-search { background: var(--ui-bg); border: 1px solid var(--ui-border); padding: 10px 15px; color: white; border-radius: 8px; font-family: 'Space Mono'; width: 250px; outline: none; }
        #city-search:focus { border-color: var(--red); }
        #search-btn { background: var(--red); border: none; color: white; padding: 10px 20px; border-radius: 8px; font-family: 'Space Mono'; cursor: pointer; font-weight: bold; }

        #hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--ui-bg); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--ui-border); font-size: 11px; font-family: 'Space Mono'; color: var(--red); pointer-events: none; z-index: 10; }

        /* Форма */
        #form-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--ui-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--ui-border); width: 320px; display: flex; flex-direction: column; gap: 15px; }
        input.form-input { background: rgba(255,255,255,0.05); border: 1px solid var(--ui-border); padding: 12px; color: white; border-radius: 8px; font-family: 'Space Mono'; outline: none; }
        input.form-input:focus { border-color: var(--red); }
        button#submit-btn { background: var(--red); border: none; padding: 12px; color: white; border-radius: 8px; font-family: 'Space Mono'; font-weight: bold; cursor: pointer; }
        button#cancel-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 11px; }

        #tooltip { position: fixed; background: var(--ui-bg); border: 1px solid var(--ui-border); border-radius: 10px; padding: 10px 15px; pointer-events: none; opacity: 0; z-index: 100; backdrop-filter: blur(10px); }
        #tooltip.show { opacity: 1; }
    </style>
</head>
<body>

<div id="header">
    <div id="logo"><strong>MDS</strong> <em>Location</em></div>
    <div id="trader-count" style="font-family:'Space Mono'; font-size:10px; pointer-events: auto;">LOADING...</div>
</div>

<div id="search-container">
    <input type="text" id="city-search" placeholder="FIND YOUR CITY...">
    <button id="search-btn">GO</button>
</div>

<div id="hint">Найди свой город или кликни на карту</div>

<div id="form-modal">
    <div class="modal-content">
        <div style="font-family:'Space Mono'; font-size:14px; margin-bottom:10px" id="modal-title">NEW TRADER SIGNAL</div>
        <input type="text" id="username" class="form-input" placeholder="ENTER YOUR NAME" maxlength="20">
        <div id="location-display" style="font-size:10px; color:#e63535; font-family:'Space Mono'">CITY: SELECTING...</div>
        <button id="submit-btn">SEND REQUEST</button>
        <button id="cancel-btn">CANCEL</button>
    </div>
</div>

<div id="tooltip"></div>

<svg id="map">
    <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <g id="main-g"></g>
</svg>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://hliiypszpyeivrcgkwsj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsaWl5cHN6cHllaXZyY2drd3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTY5ODksImV4cCI6MjA5NDE5Mjk4OX0.F70Fwq8UnDC3s6dA3MJw4nrYBIqRbuAW4fEns9WOznU';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const svg = d3.select('#map');
const g = d3.select('#main-g');
const tooltip = d3.select('#tooltip');
let projection = d3.geoNaturalEarth1().scale(window.innerWidth / 6.2).translate([window.innerWidth / 2, window.innerHeight / 1.7]);
const path = d3.geoPath().projection(projection);

let tempCoords = [0, 0];
let currentZoomTransform = d3.zoomIdentity;

// Инициализация карты
async function init() {
    const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const countries = topojson.feature(world, world.objects.countries);

    g.append('path').datum(d3.geoGraticule()()).attr('fill', 'none').attr('stroke', 'rgba(255,255,255,0.03)').attr('d', path);
    g.selectAll('.country').data(countries.features).enter().append('path').attr('class', 'country').attr('d', path);
    g.append('path').datum(topojson.mesh(world, world.objects.countries, (a, b) => a !== b)).attr('class', 'country-border').attr('d', path);

    loadApprovedTraders();
}

// Загрузка точек
async function loadApprovedTraders() {
    const { data, error } = await supabaseClient.from('traders').select('*').eq('approved', true);
    if (error) return;
    document.getElementById('trader-count').innerText = `${data.length} TRADERS TOTAL`;
    
    g.selectAll('.trader-point').remove();
    const points = g.selectAll('.trader-point').data(data);
    
    points.enter().append('circle')
        .attr('class', 'trader-point')
        .attr('r', 5)
        .attr('fill', '#e63535')
        .attr('filter', 'url(#glow)')
        .attr('cx', d => projection([d.lng, d.lat])[0])
        .attr('cy', d => projection([d.lng, d.lat])[1])
        .style('cursor', 'pointer')
        .on('mouseover', (e, d) => {
            tooltip.classed('show', true).html(`<div style="font-family:'Space Mono'; font-size:12px; color:#e63535">${d.name}</div>`);
        })
        .on('mousemove', (e) => tooltip.style('left', (e.clientX + 15)+'px').style('top', (e.clientY + 15)+'px'))
        .on('mouseout', () => tooltip.classed('show', false));
}

// Поиск города
document.getElementById('search-btn').onclick = async () => {
    const query = document.getElementById('city-search').value;
    if (!query) return;

    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
    const data = await res.json();

    if (data.length > 0) {
        const city = data[0];
        tempCoords = [parseFloat(city.lon), parseFloat(city.lat)];
        
        // Показываем форму
        document.getElementById('location-display').innerText = `CITY: ${city.display_name.split(',')[0].toUpperCase()}`;
        document.getElementById('form-modal').style.display = 'flex';
        
        // Перемещаем камеру к городу
        const pos = projection(tempCoords);
        svg.transition().duration(1000).call(
            zoom.transform, 
            d3.zoomIdentity.translate(window.innerWidth/2, window.innerHeight/2).scale(4).translate(-pos[0], -pos[1])
        );
    } else {
        alert('City not found');
    }
};

// Обработка клика (улучшенная точность)
svg.on('click', function(e) {
    if (e.target.classList.contains('country') || e.target.id === 'map') {
        const [mx, my] = d3.pointer(e);
        // Учитываем текущий трансформ зума
        const inv = currentZoomTransform.invert([mx, my]);
        tempCoords = projection.invert(inv);
        
        document.getElementById('location-display').innerText = `COORDS: ${tempCoords[1].toFixed(2)}, ${tempCoords[0].toFixed(2)}`;
        document.getElementById('form-modal').style.display = 'flex';
    }
});

document.getElementById('cancel-btn').onclick = () => document.getElementById('form-modal').style.display = 'none';

document.getElementById('submit-btn').onclick = async () => {
    const name = document.getElementById('username').value;
    if (!name) return alert('Enter name');

    const { error } = await supabaseClient.from('traders').insert([
        { name: name, lng: tempCoords[0], lat: tempCoords[1], approved: false }
    ]);

    if (error) {
        alert('Error sending data');
    } else {
        alert('Sent! Wait for approval.');
        document.getElementById('form-modal').style.display = 'none';
        document.getElementById('username').value = '';
    }
};

const zoom = d3.zoom().scaleExtent([1, 40]).on('zoom', (e) => {
    currentZoomTransform = e.transform;
    g.attr('transform', e.transform);
    g.selectAll('.trader-point').attr('r', 5 / Math.sqrt(e.transform.k)); // Точки не становятся огромными при зуме
});

svg.call(zoom);
init();
</script>
</body>
</html>
