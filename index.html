<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MDS Location | Global Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f0f;
      --land: #181818;
      --land-stroke: rgba(255,255,255,0.15);
      --red: #e63535;
      --red-dim: rgba(230,53,53,0.25);
      --ui-bg: rgba(20,20,20,0.92);
      --ui-border: rgba(255,255,255,0.08);
      --text: #eee;
      --text-muted: rgba(255,255,255,0.4);
    }
    body { background: var(--bg); overflow: hidden; font-family: 'Syne', sans-serif; color: var(--text); }

    /* ── MAP ── */
    svg#map { width: 100vw; height: 100vh; display: block; background: var(--bg); cursor: grab; }
    svg#map:active { cursor: grabbing; }
    .country { fill: var(--land); stroke: var(--land-stroke); stroke-width: 0.5px; vector-effect: non-scaling-stroke; }
    .country-border { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 0.8px; vector-effect: non-scaling-stroke; }
    .graticule { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 0.4px; vector-effect: non-scaling-stroke; }

    /* ── UI ELEMENTS ── */
    #header {
      position: fixed; top: 0; width: 100%; padding: 25px 30px;
      display: flex; justify-content: space-between; align-items: center;
      pointer-events: none; z-index: 100;
    }
    #logo { font-family: 'Space Mono'; letter-spacing: 0.3em; text-transform: uppercase; pointer-events: auto; font-size: 14px; }
    #logo em { color: var(--red); font-style: normal; font-weight: bold; }
    #status-badge { font-family: 'Space Mono'; font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; pointer-events: auto; }
    #status-badge::before { content: ''; width: 6px; height: 6px; background: var(--red); border-radius: 50%; box-shadow: 0 0 8px var(--red); animation: blink 2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── SEARCH ── */
    #search-box { position: fixed; top: 90px; left: 30px; z-index: 110; display: flex; gap: 8px; }
    #city-search {
      background: var(--ui-bg); border: 1px solid var(--ui-border); padding: 12px 18px;
      color: white; border-radius: 10px; font-family: 'Space Mono'; width: 260px; outline: none;
      backdrop-filter: blur(10px);
    }
    #city-search:focus { border-color: var(--red); }
    #search-btn {
      background: var(--red); border: none; color: white; padding: 0 20px;
      border-radius: 10px; font-family: 'Space Mono'; cursor: pointer; font-weight: bold;
    }

    /* ── TOOLTIP (Original Style) ── */
    #tooltip {
      position: fixed; background: var(--ui-bg); border: 1px solid var(--ui-border);
      border-radius: 12px; padding: 15px; pointer-events: none; opacity: 0;
      z-index: 500; backdrop-filter: blur(12px); min-width: 180px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: opacity 0.2s;
    }
    #tooltip.show { opacity: 1; }
    .tt-header { font-family: 'Space Mono'; color: var(--text-muted); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; border-bottom: 1px solid var(--ui-border); padding-bottom: 5px; }
    .tt-user { font-family: 'Space Mono'; color: var(--red); font-size: 14px; font-weight: bold; display: block; margin-bottom: 3px; }
    .tt-location { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-family: 'Space Mono'; }

    /* ── MODAL ── */
    #form-modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px);
    }
    .modal-content {
      background: var(--ui-bg); padding: 35px; border-radius: 20px; border: 1px solid var(--ui-border);
      width: 340px; display: flex; flex-direction: column; gap: 20px;
    }
    .form-input {
      background: rgba(255,255,255,0.05); border: 1px solid var(--ui-border);
      padding: 14px; color: white; border-radius: 10px; font-family: 'Space Mono'; outline: none;
    }
    .btn-main { background: var(--red); border: none; padding: 15px; color: white; border-radius: 10px; font-family: 'Space Mono'; font-weight: bold; cursor: pointer; }

    /* ── POINTS ── */
    .point-outer { fill: none; stroke: var(--red); stroke-width: 1; }
    .point-inner { fill: var(--red); cursor: pointer; }
  </style>
</head>
<body>

<div id="header">
  <div id="logo"><strong>MDS</strong> <em>Location</em></div>
  <div id="status-badge">SYNCING GLOBAL NETWORK...</div>
</div>

<div id="search-box">
  <input type="text" id="city-search" placeholder="SEARCH OPERATIVE CITY...">
  <button id="search-btn">GO</button>
</div>

<div id="form-modal">
  <div class="modal-content">
    <div style="font-family:'Space Mono'; font-size:12px; color:var(--text-muted); letter-spacing:1px">SIGNAL IDENTIFIED</div>
    <input type="text" id="username" class="form-input" placeholder="OPERATOR ID" maxlength="20">
    <div id="location-display" style="font-family:'Space Mono'; font-size:11px; color:var(--red)"></div>
    <button id="submit-btn" class="btn-main">TRANSMIT SIGNAL</button>
    <button id="cancel-btn" style="background:transparent; border:none; color:var(--text-muted); cursor:pointer; font-size:10px; text-transform:uppercase">Abort</button>
  </div>
</div>

<div id="tooltip"></div>

<svg id="map">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <g id="main-g"></g>
</svg>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://hliiypszpyeivrcgkwsj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsaWl5cHN6cHllaXZyY2drd3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTY5ODksImV4cCI6MjA5NDE5Mjk4OX0.F70Fwq8UnDC3s6dA3MJw4nrYBIqRbuAW4fEns9WOznU';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ZOOM_THRESHOLD = 3.5;
const svg = d3.select('#map');
const g = d3.select('#main-g');
const tooltip = d3.select('#tooltip');
let projection = d3.geoNaturalEarth1().scale(window.innerWidth / 6).translate([window.innerWidth / 2, window.innerHeight / 1.6]);
const path = d3.geoPath().projection(projection);

let allTraders = [];
let currentZoomK = 1;
let tempCoords = [0, 0];

async function init() {
  const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
  g.selectAll('.country').data(topojson.feature(world, world.objects.countries).features).enter().append('path').attr('class', 'country').attr('d', path);
  g.append('path').datum(topojson.mesh(world, world.objects.countries, (a, b) => a !== b)).attr('class', 'country-border').attr('d', path);

  await loadData();
}

async function loadData() {
  const { data, error } = await supabaseClient.from('traders').select('*').eq('approved', true);
  if (!error) {
    allTraders = data;
    document.getElementById('status-badge').innerText = `${data.length} TRADERS ONLINE`;
    renderPoints();
  }
}

function renderPoints() {
  g.selectAll('.trader-node').remove();
  let displayData = [];

  if (currentZoomK < ZOOM_THRESHOLD) {
    const groups = d3.group(allTraders, d => d.country_code || 'GLOBAL');
    groups.forEach((members, country) => {
      displayData.push({ 
        isCluster: true, 
        lng: d3.mean(members, m => m.lng), 
        lat: d3.mean(members, m => m.lat), 
        members: members,
        country: country 
      });
    });
  } else {
    displayData = allTraders.map(d => ({ ...d, isCluster: false }));
  }

  const nodes = g.selectAll('.trader-node').data(displayData).enter().append('g').attr('class', 'trader-node');

  nodes.each(function(d) {
    const el = d3.select(this);
    const pos = projection([d.lng, d.lat]);

    // Rings
    const ring = el.append('circle').attr('class', 'point-outer').attr('cx', pos[0]).attr('cy', pos[1]).attr('r', 5);
    function pulse() {
      ring.attr('r', 5).style('opacity', 0.8).transition().duration(2000).attr('r', 20).style('opacity', 0).on('end', pulse);
    }
    pulse();

    // Point
    el.append('circle').attr('class', 'point-inner').attr('cx', pos[0]).attr('cy', pos[1])
      .attr('r', 5 / Math.sqrt(currentZoomK)).attr('filter', 'url(#glow)')
      .on('mouseover', (e) => {
        tooltip.classed('show', true);
        if (d.isCluster) {
          const list = d.members.map(m => `<span class="tt-user">${m.name}</span>`).join('');
          tooltip.html(`<div class="tt-header">TRADERS IN ${d.country}</div>${list}`);
        } else {
          tooltip.html(`<div class="tt-header">OPERATIVE</div><span class="tt-user">${d.name}</span><div class="tt-location">${d.city || 'Unknown Location'}</div>`);
        }
      })
      .on('mousemove', (e) => tooltip.style('left', (e.clientX + 15)+'px').style('top', (e.clientY + 15)+'px'))
      .on('mouseout', () => tooltip.classed('show', false));
  });
}

// Search Logic
document.getElementById('search-btn').onclick = async () => {
  const query = document.getElementById('city-search').value;
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&addressdetails=1`);
  const data = await res.json();

  if (data.length > 0) {
    const city = data[0];
    tempCoords = [parseFloat(city.lon), parseFloat(city.lat)];
    const countryCC = (city.address.country_code || '??').toUpperCase();
    const cityName = city.display_name.split(',')[0].toUpperCase();

    document.getElementById('location-display').innerText = `REGION: ${cityName} (${countryCC})`;
    document.getElementById('form-modal').style.display = 'flex';
    document.getElementById('form-modal').dataset.cc = countryCC;
    document.getElementById('form-modal').dataset.city = cityName;

    const pos = projection(tempCoords);
    svg.transition().duration(1500).call(zoom.transform, d3.zoomIdentity.translate(window.innerWidth/2, window.innerHeight/2).scale(8).translate(-pos[0], -pos[1]));
  }
};

document.getElementById('submit-btn').onclick = async () => {
  const name = document.getElementById('username').value;
  if (!name) return;
  const modal = document.getElementById('form-modal');

  await supabaseClient.from('traders').insert([{ 
    name: name, lng: tempCoords[0], lat: tempCoords[1], 
    approved: false, country_code: modal.dataset.cc, city: modal.dataset.city 
  }]);

  alert('SIGNAL TRANSMITTED');
  modal.style.display = 'none';
};

document.getElementById('cancel-btn').onclick = () => document.getElementById('form-modal').style.display = 'none';

const zoom = d3.zoom().scaleExtent([1, 40]).on('zoom', (e) => {
  const oldK = currentZoomK;
  currentZoomK = e.transform.k;
  g.attr('transform', e.transform);
  if ((oldK < ZOOM_THRESHOLD && currentZoomK >= ZOOM_THRESHOLD) || (oldK >= ZOOM_THRESHOLD && currentZoomK < ZOOM_THRESHOLD)) renderPoints();
});

svg.call(zoom);
init();
</script>
</body>
</html>
