<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MDS Location | Global Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f0f; --land: #181818; --land-stroke: rgba(255,255,255,0.15);
      --red: #e63535; --ui-bg: rgba(20,20,20,0.96); --ui-border: rgba(255,255,255,0.1);
      --text: #eee; --text-muted: rgba(255,255,255,0.4);
    }
    body { background: var(--bg); overflow: hidden; font-family: 'Syne', sans-serif; color: var(--text); }
    svg#map { width: 100vw; height: 100vh; display: block; background: var(--bg); cursor: grab; }
    .country { fill: var(--land); stroke: var(--land-stroke); stroke-width: 0.5px; vector-effect: non-scaling-stroke; }
    .country-border { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 0.8px; vector-effect: non-scaling-stroke; }
    .graticule { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 0.4px; vector-effect: non-scaling-stroke; }

    #header { position: fixed; top: 0; width: 100%; padding: 25px 30px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
    #logo { font-family: 'Space Mono'; letter-spacing: 0.3em; text-transform: uppercase; pointer-events: auto; font-size: 14px; }
    #logo em { color: var(--red); font-style: normal; font-weight: bold; }
    #status-badge { font-family: 'Space Mono'; font-size: 10px; color: var(--text-muted); pointer-events: auto; }

    #search-box { position: fixed; top: 90px; left: 30px; z-index: 110; display: flex; gap: 8px; }
    #city-search {
      background: var(--ui-bg); border: 1px solid var(--ui-border); padding: 12px 18px;
      color: white; border-radius: 10px; font-family: 'Space Mono'; width: 260px; outline: none;
      backdrop-filter: blur(10px);
    }
    #search-btn { background: var(--red); border: none; color: white; padding: 0 20px; border-radius: 10px; font-family: 'Space Mono'; cursor: pointer; font-weight: bold; }

    #tooltip {
      position: fixed; background: var(--ui-bg); border: 1px solid var(--ui-border);
      border-radius: 12px; padding: 16px; pointer-events: none; opacity: 0;
      z-index: 500; backdrop-filter: blur(15px); min-width: 200px; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
      transition: opacity 0.15s ease-out;
    }
    #tooltip.show { opacity: 1; }
    .tt-header { font-family: 'Space Mono'; color: var(--text-muted); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid var(--ui-border); padding-bottom: 6px; }
    .tt-user { font-family: 'Space Mono'; color: var(--red); font-size: 14px; font-weight: 700; display: block; margin-bottom: 4px; }

    #form-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .modal-content { background: var(--ui-bg); padding: 35px; border-radius: 20px; border: 1px solid var(--ui-border); width: 340px; display: flex; flex-direction: column; gap: 20px; }
    .form-input { background: rgba(255,255,255,0.05); border: 1px solid var(--ui-border); padding: 14px; color: white; border-radius: 10px; font-family: 'Space Mono'; outline: none; }
    .btn-main { background: var(--red); border: none; padding: 15px; color: white; border-radius: 10px; font-family: 'Space Mono'; font-weight: bold; cursor: pointer; }

    .point-outer { fill: none; stroke: var(--red); stroke-width: 1.5; pointer-events: none; }
    .point-inner { fill: var(--red); cursor: pointer; }
  </style>
</head>
<body>

<div id="header">
  <div id="logo"><strong>MDS</strong> <em>Location</em></div>
  <div id="status-badge">SECURE ENCRYPTION ACTIVE</div>
</div>

<div id="search-box">
  <input type="text" id="city-search" placeholder="INPUT OPERATIVE CITY...">
  <button id="search-btn">SEARCH</button>
</div>

<div id="form-modal">
  <div class="modal-content">
    <div style="font-family:'Space Mono'; font-size:11px; color:var(--text-muted); letter-spacing:1px">NEW SIGNAL DETECTED</div>
    <input type="text" id="username" class="form-input" placeholder="OPERATOR NAME" maxlength="15">
    <div id="location-display" style="font-family:'Space Mono'; font-size:10px; color:var(--red)"></div>
    <button id="submit-btn" class="btn-main">TRANSMIT</button>
    <button id="cancel-btn" style="background:transparent; border:none; color:var(--text-muted); cursor:pointer; font-size:10px; text-transform:uppercase; margin-top: -10px;">Cancel</button>
  </div>
</div>

<div id="tooltip"></div>

<svg id="map"><g id="main-g"></g></svg>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://hliiypszpyeivrcgkwsj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsaWl5cHN6cHllaXZyY2drd3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTY5ODksImV4cCI6MjA5NDE5Mjk4OX0.F70Fwq8UnDC3s6dA3MJw4nrYBIqRbuAW4fEns9WOznU';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ZOOM_THRESHOLD = 3.5;
const svg = d3.select('#map');
const g = d3.select('#main-g');
const tooltip = d3.select('#tooltip');
let projection = d3.geoNaturalEarth1().scale(window.innerWidth / 6).translate([window.innerWidth / 2, window.innerHeight / 1.6]);
const path = d3.geoPath().projection(projection);

let allTraders = [];
let currentZoomK = 1;
let countriesFeature;

async function init() {
  const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
  countriesFeature = topojson.feature(world, world.objects.countries);
  
  g.append('path').datum(d3.geoGraticule()()).attr('class', 'graticule').attr('d', path);
  g.selectAll('.country').data(countriesFeature.features).enter().append('path').attr('class', 'country').attr('d', path);
  g.append('path').datum(topojson.mesh(world, world.objects.countries, (a, b) => a !== b)).attr('class', 'country-border').attr('d', path);
  
  await loadData();
}

async function loadData() {
  const { data, error } = await supabaseClient.from('traders').select('*').eq('approved', true);
  if (!error) {
    allTraders = data;
    document.getElementById('status-badge').innerText = `${data.length} NODES DISCOVERED`;
    renderPoints();
  }
}

function renderPoints() {
  g.selectAll('.trader-node').remove();
  let displayData = [];

  if (currentZoomK < ZOOM_THRESHOLD) {
    const groups = d3.group(allTraders, d => d.country_code);
    
    groups.forEach((members, countryCode) => {
      const countryShape = countriesFeature.features.find(f => 
        f.id === countryCode || (f.properties.name && members[0].country_name && f.properties.name.toLowerCase() === members[0].country_name.toLowerCase())
      );

      let center;
      if (countryShape) {
        center = d3.geoCentroid(countryShape);
      } else {
        center = [members[0].lng, members[0].lat];
      }

      displayData.push({ 
        isCluster: true, 
        lng: center[0], 
        lat: center[1], 
        members: members,
        countryName: countryCode 
      });
    });
  } else {
    displayData = allTraders.map(d => ({ ...d, isCluster: false }));
  }

  const nodes = g.selectAll('.trader-node').data(displayData).enter().append('g').attr('class', 'trader-node');

  nodes.each(function(d) {
    const el = d3.select(this);
    const pos = projection([d.lng, d.lat]);

    const ring = el.append('circle').attr('class', 'point-outer').attr('cx', pos[0]).attr('cy', pos[1]).attr('r', 5);
    (function pulse() {
      ring.attr('r', 5).style('opacity', 0.8).transition().duration(2500).attr('r', 25).style('opacity', 0).on('end', pulse);
    })();

    el.append('circle').attr('class', 'point-inner').attr('cx', pos[0]).attr('cy', pos[1])
      .attr('r', 6 / Math.sqrt(currentZoomK))
      .on('mouseover', (e) => {
        tooltip.classed('show', true);
        if (d.isCluster) {
          const names = d.members.map(m => `<span class="tt-user">${m.name}</span>`).join('');
          tooltip.html(`<div class="tt-header">TRADERS IN ${d.countryName}</div>${names}`);
        } else {
          tooltip.html(`<div class="tt-header">OPERATIVE PROFILE</div><span class="tt-user">${d.name}</span><div style="font-size:10px; color:rgba(255,255,255,0.4); text-transform:uppercase; font-family:'Space Mono';">${d.city}</div>`);
        }
      })
      .on('mousemove', (e) => tooltip.style('left', (e.clientX + 15)+'px').style('top', (e.clientY + 15)+'px'))
      .on('mouseout', () => tooltip.classed('show', false));
  });
}

document.getElementById('search-btn').onclick = async () => {
  const query = document.getElementById('city-search').value;
  if(!query) return;
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&addressdetails=1`);
  const data = await res.json();

  if (data.length > 0) {
    const city = data[0];
    const coords = [parseFloat(city.lon), parseFloat(city.lat)];
    const cc = (city.address.country_code || '??').toUpperCase();
    const countryName = city.address.country || '';
    const cityName = (city.address.city || city.address.town || city.address.village || city.display_name.split(',')[0]).toUpperCase();

    document.getElementById('location-display').innerText = `SECTOR: ${cityName} [${cc}]`;
    document.getElementById('form-modal').style.display = 'flex';
    window.currentPending = { coords, cc, countryName, cityName };

    const pos = projection(coords);
    svg.transition().duration(1500).call(zoom.transform, d3.zoomIdentity.translate(window.innerWidth/2, window.innerHeight/2).scale(8).translate(-pos[0], -pos[1]));
  }
};

document.getElementById('submit-btn').onclick = async () => {
  const name = document.getElementById('username').value;
  if (!name) return;

  await supabaseClient.from('traders').insert([{ 
    name: name, 
    lng: window.currentPending.coords[0], 
    lat: window.currentPending.coords[1], 
    approved: true,
    country_code: window.currentPending.cc, 
    country_name: window.currentPending.countryName,
    city: window.currentPending.cityName 
  }]);

  alert('SIGNAL TRANSMITTED');
  location.reload();
};

document.getElementById('cancel-btn').onclick = () => document.getElementById('form-modal').style.display = 'none';

const zoom = d3.zoom().scaleExtent([1, 40]).on('zoom', (e) => {
  const oldK = currentZoomK;
  currentZoomK = e.transform.k;
  g.attr('transform', e.transform);
  if ((oldK < ZOOM_THRESHOLD && currentZoomK >= ZOOM_THRESHOLD) || (oldK >= ZOOM_THRESHOLD && currentZoomK < ZOOM_THRESHOLD)) renderPoints();
});

svg.call(zoom);
init();
</script>
</body>
</html>
